# Before running, find and replace the src-volume the volume throughout this file

# To backup the volume:
  # docker compose run backup && docker compose rm -fv
# To restore a volume:
  # docker compose run restore && docker compose rm -fv
# To bypass the command and enter container for debugging:
  # docker compose run backup sh && docker compose rm -fv

---
volumes:
  remote-backup-location:
    name: remote-backup-location
    driver_opts:
      type: nfs
      o: addr=${remote_storage_server},nfsvers=4.2,soft,nolock,rw
      device: ":${remote_fast_location}/backups/containers"
  src-volume:
    name: src-volume
    external: true

services:
  backup:
    image: alpine
    volumes:
      - src-volume:/src
      - remote-backup-location:/dest
    command: sh -c "mkdir -p /dest/manual/src-volume && cd /src && tar -cvf /dest/manual/src-volume/$$(date '+%Y-%m-%d-%H%M').tar ."

  restore:
    image: alpine
    volumes:
      - src-volume:/src
      - remote-backup-location:/dest
    command: sh -c "tar xvf $$(ls -t /dest/manual/src-volume/* | head -1) -C /src"
