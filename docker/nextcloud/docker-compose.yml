---
networks:
  external-bridge:
    name: external-bridge
  internal-nextcloud:
    name: internal-nextcloud
    internal: true

volumes:
  nextcloud-redis:
    name: nextcloud-redis

services:
  nextcloud:
    image: nextcloud:33.0.0-apache
    container_name: nextcloud
    restart: unless-stopped
    privileged: false
    security_opt: [no-new-privileges:true]
    user: "${apps_user}"
    networks: [external-bridge, internal-nextcloud]
    ports:
      - 8083:80
    volumes:
      - ${local_apps_location}/nextcloud/app:/var/www/html
      - ${local_apps_location}/nextcloud/data:/var/www/html/data
      - ${local_apps_location}/nextcloud/redis-session.ini:/usr/local/etc/php/conf.d/redis-session.ini
      - ${local_apps_location}/nextcloud/remoteip.conf:/etc/apache2/conf-enabled/remoteip.conf:ro
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: drive.${DOMAIN}
      OVERWRITEPROTOCOL: https
      # https://github.com/nextcloud/docker/issues/1494
      # APACHE_DISABLE_REWRITE_IP: 1
      # trusted proxies only needs declared once during config.php population (set to the reverse proxy IP)
      # TRUSTED_PROXIES: x.x.x.x
      PHP_UPLOAD_LIMIT: 512M
      REDIS_HOST: nextcloud-redis
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${nextcloud_pg_user}
      POSTGRES_PASSWORD: ${nextcloud_pg_pass}
      NEXTCLOUD_ADMIN_PASSWORD: ${nextcloud_admin_password}
      NEXTCLOUD_ADMIN_USER: ${nextcloud_admin_user}
      NEXTCLOUD_DATADIR: /var/www/html/data
    links:
      - nextcloud-db
      - nextcloud-redis
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy

  # Upgrade postgres database (database name = nextcloud)
  # pg_dumpall -U ${nextcloud_pg_user} > /backup/dump.sql
  # psql -U ${nextcloud_pg_user} -f /backup/dump.sql nextcloud
  nextcloud-db:
    image: postgres:16
    container_name: nextcloud-db
    restart: unless-stopped
    privileged: false
    security_opt: [no-new-privileges:true]
    networks: [internal-nextcloud]
    volumes:
      - ${local_apps_location}/nextcloud/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${nextcloud_pg_user}
      POSTGRES_PASSWORD: ${nextcloud_pg_pass}
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      start_period: 5s

  # WOPI feature check: https://collabora.$DOMAIN/hosting/discovery
  # Admin interface: https://collabora.$DOMAIN/browser/dist/admin/admin.html
  collabora:
    image: collabora/code:25.04.9.4.1
    container_name: collabora
    restart: unless-stopped
    cap_add:
      - MKNOD
    networks: [external-bridge]
    ports:
      - 9980:9980
    environment:
      domain: drive.${DOMAIN}
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true"
      dictionaries: en_US
      DONT_GEN_SSL_CERT: true
      #username: admin
      #password: admin

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    hostname: nextcloud-redis
    restart: unless-stopped
    networks: [internal-nextcloud]
    volumes:
      - nextcloud-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
