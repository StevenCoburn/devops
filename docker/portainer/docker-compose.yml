---
volumes:
  portainer:
    name: portainer

services:
  containers:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    # Set privileged to true if using selinux, :z does not work here
    privileged: false
    security_opt: [no-new-privileges:true]
    network_mode: bridge
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer:/data
